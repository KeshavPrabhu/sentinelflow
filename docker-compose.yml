# sentinelflow / docker-compose.yml

version: '3.8'

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: sentinel-app
    restart: always
    environment:
      - DATABASE_URl=postgresql://${DB_USER:-pipelineops}:${DB_PASSWORD:-pipelinepass}@postgres:5432/${DB_NAME:-pipelineops}
      - REDIS_URL=redis://redis:6379/0
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - GITLAB_TOKEN=${GITLAB_TOKEN}
    networks:
      - frontend_net
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy 
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15.3-alpine
    container_name: sentinel-db
    environment:
      - POSTGRES_USER=${DB_USER:-pipelineops}
      - POSTGRES_PASSWORD={DB_PASSWORD:-pipelinepass}
      - POSTGRES_DB=${DB_NAME:-pipelineops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:pipelineops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  redis:
    image: redis:7.2-alpine
    container_name: sentinel-redis
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  nginx:
    image: nginx:1.25.1-alpine
    container_name: sentinel=proxy 
    ports: 
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - frontend_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  jenkins:
    image: jenkins/jenkins:2.414.2-lts
    container_name: sentinel-jenkins
    user: root
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 1024M
    networks:
      - backend_net

  registry:
    image: registry:2.8.2
    container_name: sentinel-registry
    ports:
      - "5001:5000"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - backend_net
  
  networks:
    frontend_net:
      driver: bridge
    backend_net:
      driver: bridge
  
  volumes:
    postgres_data:
    redis_data:
    jenkins_home:
    registry_data:
    
