apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-app
  namespace: pipelineops-staging
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sentinel-app
  template:
    metadata:
      labels:
        app: sentinel-app
    spec:
      containers:
      - name: app
        image: localhost:5001/sentinelflow:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
        envFrom:
        - configMapRef:
            name: sentinel-config
        - secretRef:
            name: sentinel-secrets